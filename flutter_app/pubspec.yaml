version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  uuid: ^4.4.2
  intl: ^0.19.0
  supabase_flutter: ^2.8.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
