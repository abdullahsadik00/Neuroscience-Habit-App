<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1d4ed8; }
      }
    </style>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- App icon background — rounded square -->
  <rect class="bg" width="100" height="100" rx="22" fill="url(#bg-grad)"/>

  <!-- Neural "N" mark: 4 nodes + 3 connections -->
  <!-- Left vertical -->
  <line x1="27" y1="25" x2="27" y2="75" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-opacity="0.95"/>
  <!-- Diagonal (the neural comeback path) -->
  <line x1="27" y1="25" x2="73" y2="75" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-opacity="0.80"/>
  <!-- Right vertical -->
  <line x1="73" y1="25" x2="73" y2="75" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- Node dots at each vertex -->
  <circle cx="27" cy="25" r="6" fill="white"/>
  <circle cx="27" cy="75" r="6" fill="white"/>
  <circle cx="73" cy="25" r="6" fill="white"/>
  <circle cx="73" cy="75" r="6" fill="white"/>
</svg>
